server:
  port: 8082

spring:
  application:
    name: battlemetrics-service

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: battlemetrics-workers
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.use.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.squad.battlemetrics.dto.UserRegisteredEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

battlemetrics:
  api:
    base-url: "https://api.battlemetrics.com"

resilience4j.ratelimiter:
  instances:
    battlemetricsApi:
      limitForPeriod: 60
      limitRefreshPeriod: 1m
      timeoutDuration: 5s