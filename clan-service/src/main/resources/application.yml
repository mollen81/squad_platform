server:
  port: 8084

spring:
  application:
    name: clan-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
      show-sql: true

  flyway:
    enabled: true
    table: flyway_schema_history_clans
    baseline-on-migrate: true
    baseline-version: '0'